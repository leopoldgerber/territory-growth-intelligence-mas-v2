services:
  postgres:
    image: postgres:15
    container_name: tgi_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tgi_local}
      POSTGRES_USER: ${POSTGRES_USER:-tgi_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tgi_password}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tgi_network

volumes:
  postgres_data:

networks:
  tgi_network:
    driver: bridge
